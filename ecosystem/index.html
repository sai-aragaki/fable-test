<style>
:root{
  --bg:#04101e; --panel:rgba(10,20,32,.78); --line:rgba(110,200,255,.16);

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
canvas{position:fixed;inset:0;display:block;touch-action:none;cursor:crosshair}

#hud{position:fixed;top:14px;left:16px;color:var(--dim);font-size:11px;
  letter-spacing:.08em;line-height:1.8;pointer-events:none;z-index:5;text-shadow:0 1px 10px #000}
#hud b{color:var(--txt);font-size:12px;letter-spacing:.22em}
#fps{position:fixed;top:14px;right:16px;color:var(--dim);font-size:11px;
  letter-spacing:.1em;pointer-events:none;z-index:5;text-align:right;line-height:1.8;text-shadow:0 1px 10px #000}
#fps b{color:var(--acc)}

#hint{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);z-index:6;
  background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:20px;padding:26px 34px;color:var(--txt);
  text-align:center;pointer-events:none;transition:opacity .6s ease,transform .6s ease;
  box-shadow:0 12px 60px rgba(0,0,0,.5);max-width:88vw}
#hint .big{font-size:clamp(17px,3.4vw,24px);font-weight:700;letter-spacing:.14em;margin-bottom:14px;
  background:linear-gradient(90deg,#54e0c8,#5ab8ff,#b48cff);-webkit-background-clip:text;background-clip:text;color:transparent}
#hint .row{font-size:clamp(11px,2.2vw,13px);color:var(--dim);line-height:2;letter-spacing:.05em}
#hint .row b{color:var(--txt);font-weight:600}
#hint.off{opacity:0;transform:translate(-50%,-62%)}

#bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:10;
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center;

  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.45)}

.btn.on span{color:var(--acc)}

#toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(10px);
  opacity:0;transition:.25s ease;background:var(--panel);border:1px solid var(--line);
  backdrop-filter:blur(10px);padding:8px 16px;border-radius:12px;font-size:12px;
  color:var(--txt);z-index:11;pointer-events:none;letter-spacing:.05em;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<body>
<canvas id="cv"></canvas>

<div id="hud"><b>FABLE ECOSYSTEM</b><br><span id="stats">…</span></div>
<div id="fps"><b id="fpsv">60</b> fps<br><span id="mode">☀️ ひる</span></div>

<div id="hint">
  <div class="big">さわって、みて、かんじて</div>
  <div class="row"><b>🤿 ドラッグでえさをまく</b> — ちいさな魚は ♥ さかって ふえる</div>
  <div class="row"><b>🦈 タメして、サメをだす</b> — 群れをおいかけてまわる</div>
  <div class="row"><b>🌊 ながれツールでドラッグ</b> — 水流をおこして群れをほんとうにながす</div>
</div>

<div id="bar">
  <button class="btn tool on" id="t-food"><em>🤿</em><span>えさ</span></button>
  <button class="btn tool" id="t-pred"><em>🦈</em><span>サメ</span></button>
  <button class="btn tool" id="t-flow"><em>🌊</em><span>ながれ</span></button>
  <i class="sep"></i>
  <button class="btn" id="b-night"><em>🌙</em><span>よる</span></button>
  <button class="btn" id="b-slow"><em>🐢</em><span>スロー</span></button>
  <button class="btn on" id="b-snd"><em>🔊</em><span>おと</span></button>
  <button class="btn" id="b-reset"><em>↺</em><span>リセット</span></button>
</div>
<div id="toast"></div>

<script>
"use strict";
/* ================= helpers ================= */
const TAU = Math.PI*2;
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const lerp  = (a,b,t)=> a+(b-a)*t;
const rand  = (a=1,b)=> b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const dist  = (x1,y1,x2,y2)=> Math.hypot(x2-x1,y2-y1);
const $ = id => document.getElementById(id);

/* ================= canvas ================= */
const cv = $("cv"), ctx = cv.getContext("2d");
let W=0,H=0,DPR=1, SURF=30, SAND=0;
let trailCv=null, tctx=null;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = innerWidth; H = innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  SAND = H-34;
  trailCv = document.createElement("canvas");
  trailCv.width=W; trailCv.height=H;
  tctx = trailCv.getContext("2d");
  flowInit();
}

/* ================= audio ================= */
const AudioFX = {
  ctx:null, master:null, nbuf:null, on:true, last:{}, ambient:null,
  init(){
    if(this.ctx) return;
    try{
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value=.6;
      this.master.connect(this.ctx.destination);
      const len=this.ctx.sampleRate;
      this.nbuf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=this.nbuf.getChannelData(0);
      let v=0;
      for(let i=0;i<len;i++){ v=v*.97+(Math.random()*2-1)*.15; d[i]=v*2.4; }
      // ambient underwater hum
      const s=this.ctx.createBufferSource(); s.buffer=this.nbuf; s.loop=true;
      const f=this.ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=210;
      const g=this.ctx.createGain(); g.gain.value=.055;
      s.connect(f); f.connect(g); g.connect(this.master);
      s.start();
      this.ambient=g;
    }catch(e){}
  },
  resume(){ if(this.ctx && this.ctx.state==="suspended") this.ctx.resume(); },
  ok(type,gap){
    if(!this.ctx||!this.on) return false;
    const t=performance.now();
    if(t-(this.last[type]||0)<gap) return false;
    this.last[type]=t; return true;
  },
  blip(f0,f1,dur,type,vol){
    const c=this.ctx,t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain();
    o.type=type;
    o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t+dur+.02);
  },
  noise(dur,freq,vol){
    const c=this.ctx,t=c.currentTime;
    const s=c.createBufferSource(); s.buffer=this.nbuf; s.loop=true;
    s.playbackRate.value=rand(2,4);
    const f=c.createBiquadFilter(); f.type="lowpass"; f.frequency.value=freq;
    const g=c.createGain();
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    s.connect(f); f.connect(g); g.connect(this.master);
    s.start(t); s.stop(t+dur+.02);
  },
  sprinkle(){ if(!this.ok("spr",90))return; this.blip(rand(1100,1500),700,.04,"sine",.03); },
  gulp(){ if(!this.ok("gulp",120))return; this.blip(330,70,.13,"sine",.16); this.noise(.1,900,.1); },
  splash(){ if(!this.ok("spl",200))return; this.noise(.25,800,.22); this.blip(220,60,.2,"sine",.1); },
  heart(){ if(!this.ok("hrt",250))return; this.blip(660,660,.06,"sine",.04); this.blip(880,880,.07,"sine",.035); },
  pop(){ if(!this.ok("pop",350))return; this.blip(rand(800,1100),500,.025,"sine",.02); },
  dead(){ if(!this.ok("ded",400))return; this.blip(220,50,.5,"triangle",.08); }
};

/* ================= glow sprites ================= */
const glowCache={};
function glow(hue){
  const k=Math.round(hue/15)*15;
  let c=glowCache[k];
  if(!c){
    c=document.createElement("canvas"); c.width=c.height=64;
    const g=c.getContext("2d");
    const gr=g.createRadialGradient(32,32,0,32,32,32);
    gr.addColorStop(0,`hsla(${k},95%,75%,1)`);
    gr.addColorStop(.35,`hsla(${k},95%,60%,.5)`);
    gr.addColorStop(1,`hsla(${k},95%,50%,0)`);
    g.fillStyle=gr; g.fillRect(0,0,64,64);
    glowCache[k]=c;
  }
  return c;
}

/* ================= flow field ================= */
const FCELL=48;
let fCols=0, fRows=0, flowX=null, flowY=null;
function flowInit(){
  fCols=Math.ceil(W/FCELL)+1; fRows=Math.ceil(H/FCELL)+1;
  flowX=new Float32Array(fCols*fRows);
  flowY=new Float32Array(fCols*fRows);
}
function flowAdd(x,y,vx,vy){
  const cx=x/FCELL, cy=y/FCELL;
  for(let i=-1;i<=1;i++) for(let j=-1;j<=1;j++){
    const gx=Math.round(cx)+i, gy=Math.round(cy)+j;
    if(gx<0||gy<0||gx>=fCols||gy>=fRows) continue;
    const w=1/(1+Math.abs(i)+Math.abs(j));
    const id=gy*fCols+gx;
    flowX[id]=clamp(flowX[id]+vx*w, -420, 420);
    flowY[id]=clamp(flowY[id]+vy*w, -420, 420);
  }
}
function flowSample(x,y,out){
  const fx=clamp(x/FCELL,0,fCols-1.001), fy=clamp(y/FCELL,0,fRows-1.001);
  const x0=fx|0, y0=fy|0, tx=fx-x0, ty=fy-y0;
  const i00=y0*fCols+x0, i10=i00+1, i01=i00+fCols, i11=i01+1;
  out.x = lerp(lerp(flowX[i00],flowX[i10],tx), lerp(flowX[i01],flowX[i11],tx), ty);
  out.y = lerp(lerp(flowY[i00],flowY[i10],tx), lerp(flowY[i01],flowY[i11],tx), ty);
  out.x += Math.sin(y*.004+simT*.3)*8;
  return out;
}
function flowDecay(){
  for(let i=0;i<flowX.length;i++){ flowX[i]*=.982; flowY[i]*=.982; }
}

/* ================= species & entities ================= */
const SPECIES=[
  { hue:188, speed:175, size:1.0,  n:70 },
  { hue:32,  speed:148, size:1.3,  n:55 },
  { hue:288, speed:195, size:0.8,  n:60 },
];
const FISH_CAP=420, PRED_CAP=5, PELLET_CAP=320;
let fid=0;
class Fish{
  constructor(x,y,sp,baby){
    this.id=fid++;
    this.x=x; this.y=y;
    const a=rand(TAU);
    this.vx=Math.cos(a)*60; this.vy=Math.sin(a)*60;
    this.sp=sp;
    this.size=baby?.45:rand(.85,1.1);
    this.age=baby?0:rand(10,60);
    this.hunger=rand(.2,.7);
    this.belly=0;
    this.phase=rand(TAU);
    this.hueJ=rand(-10,10);
    this.panic=0;
    this.dead=false;
  }
}
class Pred{
  constructor(x,y){
    this.x=x; this.y=y;
    this.vx=rand(-40,40); this.vy=0;
    this.size=1;
    this.energy=1;
    this.meals=0;
    this.cool=0;
    this.phase=rand(TAU);
    this.mouth=0;
    this.dead=false; this.deadT=0;
    this.burst=0;
  }
}
let fish=[], preds=[], pellets=[], kelp=[], bubbles=[];

function makeKelp(){
  kelp=[];
  const n=clamp(Math.floor(W/180),4,9);
  for(let i=0;i<n;i++){
    const x=rand(40,W-40);
    const segs=Math.floor(rand(7,13));
    const ptsArr=[];
    for(let s=0;s<=segs;s++) ptsArr.push({x:x+rand(-3,3), y:SAND-s*16, px:x, py:SAND-s*16});
    kelp.push({pts:ptsArr, segLen:16, ph:rand(TAU), hue:rand(140,165)});
  }
}
function buildScene(){
  fish=[]; preds=[]; pellets=[]; bubbles=[];
  fid=0;
  for(let s=0;s<SPECIES.length;s++){
    const cx=rand(W*.2,W*.8), cy=rand(H*.3,H*.6);
    for(let i=0;i<SPECIES[s].n;i++)
      fish.push(new Fish(cx+rand(-90,90), cy+rand(-60,60), s, false));
  }
  preds.push(new Pred(W*.12, H*.35));
  makeKelp();
  flowInit();
}

/* ================= fx particles ================= */
const parts=[], ringsFx=[];
function burst(x,y,hue,n,spd){
  for(let i=0;i<n;i++){
    if(parts.length>400) break;
    const a=rand(TAU), s=rand(.3,1)*spd;
    parts.push({x,y,vx:Math.cos(a)*s*60,vy:Math.sin(a)*s*60,
      t:0,life:rand(.3,.7),hue:hue+rand(-12,12),r:rand(1.4,3),kind:"glow"});
  }
}
function heartFx(x,y){
  parts.push({x,y,vx:rand(-12,12),vy:-34,t:0,life:1.1,hue:340,r:1,kind:"heart"});
}
function ringFx(x,y,max,hue){
  ringsFx.push({x,y,t:0,life:.5,max,hue});
}

/* ================= state ================= */
let tool="food";
let simT=0, ts=1, sloTimer=0, slowOn=false;
let night=0, nightTarget=0, recolT=0;
const ptr={x:-999,y:-999,down:false,lx:0,ly:0,spd:0,foodAcc:0};
let popSamples=[], sampleT=0;
let pebbles=[], tracers=[], plank=[];
const fv={x:0,y:0};

function genAmbient(){
  pebbles=[];
  for(let i=0;i<W/36;i++) pebbles.push({x:rand(W), y:SAND+rand(4,18), r:rand(2,7), a:rand(.08,.22)});
  tracers=[];
  for(let i=0;i<150;i++) tracers.push({x:rand(W), y:rand(SURF+20,SAND-10)});
  plank=[];
  for(let i=0;i<70;i++) plank.push({x:rand(W), y:rand(SURF+10,SAND-10), z:rand(.3,1), ph:rand(TAU)});
}

/* ================= spatial hash ================= */
function buildHash(arr,cell){
  const m=new Map();
  for(const o of arr){
    const k=((o.x/cell)|0)+"_"+((o.y/cell)|0);
    let a=m.get(k); if(!a){a=[];m.set(k,a);}
    a.push(o);
  }
  return m;
}
function queryHash(m,cell,x,y,fn){
  const cx=(x/cell)|0, cy=(y/cell)|0;
  for(let i=-1;i<=1;i++) for(let j=-1;j<=1;j++){
    const a=m.get((cx+i)+"_"+(cy+j));
    if(a) for(const o of a) fn(o);
  }
}

/* ================= simulation ================= */
function step(dt){
  simT+=dt;
  flowDecay();
  night += clamp(nightTarget-night, -dt*.55, dt*.55);
  ptr.spd*=.88;

  const fh=buildHash(fish,64);
  const ph=buildHash(pellets,64);

  /* --- fish --- */
  for(const f of fish){
    const sp=SPECIES[f.sp];
    f.age+=dt;
    f.hunger=Math.min(1.6, f.hunger+dt*.022);
    if(f.size<1) f.size=Math.min(1, f.size+dt*.02);
    f.phase+=dt*(6+Math.hypot(f.vx,f.vy)*.045);
    f.panic=Math.max(0, f.panic-dt*1.5);

    let ax=0, ay=0;
    let sepX=0,sepY=0, alX=0,alY=0, coX=0,coY=0, nAl=0, nCo=0;
    queryHash(fh,64,f.x,f.y,o=>{
      if(o===f||o.dead) return;
      const dx=o.x-f.x, dy=o.y-f.y;
      const d2=dx*dx+dy*dy;
      if(d2>3600||d2<1e-4) return;
      const d=Math.sqrt(d2);
      if(d<22){ const w=(1-d/22)/d; sepX-=dx*w; sepY-=dy*w; }
      if(o.sp===f.sp){
        if(d<52){ alX+=o.vx; alY+=o.vy; nAl++; }
        coX+=dx; coY+=dy; nCo++;
      }
    });
    ax+=sepX*330; ay+=sepY*330;
    if(nAl){ ax+=(alX/nAl-f.vx)*1.2; ay+=(alY/nAl-f.vy)*1.2; }
    if(nCo){ ax+=coX/nCo*1.3; ay+=coY/nCo*1.3; }

    if(pellets.length && f.hunger>.25){
      let best=null, bd=25600;
      queryHash(ph,64,f.x,f.y,p=>{
        if(p.eaten) return;
        const d2=(p.x-f.x)*(p.x-f.x)+(p.y-f.y)*(p.y-f.y);
        if(d2<bd){ bd=d2; best=p; }
      });
      if(best){
        const d=Math.sqrt(bd)||1;
        const w=120+f.hunger*260;
        ax+=(best.x-f.x)/d*w; ay+=(best.y-f.y)/d*w;
        if(d < 9+f.size*4){
          best.eaten=true;
          f.hunger=Math.max(0, f.hunger-.55);
          f.belly++;
          burst(best.x,best.y,55,3,1.8);
          if(f.belly>=2){
            f.belly=0;
            if(f.age>8 && fish.length<FISH_CAP && Math.random()<.85){
              const kids=Math.random()<.3?2:1;
              for(let k=0;k<kids;k++)
                fish.push(new Fish(f.x+rand(-8,8), f.y+rand(-8,8), f.sp, true));
              heartFx(f.x, f.y-8);
              AudioFX.heart();
            }
          }
        }
      }
    }
    for(const pr of preds){
      if(pr.dead) continue;
      const dx=f.x-pr.x, dy=f.y-pr.y;
      const R=150+pr.size*30;
      const d2=dx*dx+dy*dy;
      if(d2<R*R){
        const d=Math.sqrt(d2)||1;
        const w=(1-d/R)*1400;
        ax+=dx/d*w; ay+=dy/d*w;
        f.panic=1;
      }
    }
    if(ptr.spd>420){
      const dx=f.x-ptr.x, dy=f.y-ptr.y, d2=dx*dx+dy*dy;
      if(d2<8100){
        const d=Math.sqrt(d2)||1, w=(1-d/90)*800;
        ax+=dx/d*w; ay+=dy/d*w;
        f.panic=Math.max(f.panic,.6);
      }
    }
    flowSample(f.x,f.y,fv);
    ax+=fv.x*1.3; ay+=fv.y*1.3;
    const M=70;
    if(f.x<M) ax+=(M-f.x)*6;
    if(f.x>W-M) ax-=(f.x-(W-M))*6;
    if(f.y<SURF+34) ay+=(SURF+34-f.y)*7;
    if(f.y>SAND-26) ay-=(f.y-(SAND-26))*7;
    ax+=Math.cos(f.phase*.35+f.id)*26;
    ay+=Math.sin(f.phase*.43+f.id)*26;

    const amax=900+f.panic*900;
    const aL=Math.hypot(ax,ay);
    if(aL>amax){ ax*=amax/aL; ay*=amax/aL; }
    f.vx+=ax*dt; f.vy+=ay*dt;
    const vmax=sp.speed*(.72+.28*Math.sin(f.phase*.21+f.id))*(1+f.panic*.55);
    const vL=Math.hypot(f.vx,f.vy)||1;
    if(vL>vmax){ f.vx*=vmax/vL; f.vy*=vmax/vL; }
    f.x+=f.vx*dt; f.y+=f.vy*dt;
    f.x=clamp(f.x,6,W-6); f.y=clamp(f.y,SURF+8,SAND-8);
  }

  /* --- predators --- */
  for(const pr of preds){
    pr.phase+=dt*(4+Math.hypot(pr.vx,pr.vy)*.02);
    if(pr.dead){
      pr.deadT+=dt;
      pr.vy=lerp(pr.vy,-26,dt*2);
      pr.vx*=1-dt;
      pr.x+=pr.vx*dt; pr.y+=pr.vy*dt;
      pr.y=Math.max(pr.y,SURF+10);
      if(Math.random()<dt*3) bubbleAt(pr.x+rand(-10,10), pr.y);
      continue;
    }
    pr.energy-=dt*(pr.burst>0?.04:.016);
    pr.cool=Math.max(0, pr.cool-dt);
    if(pr.energy<=0){
      pr.dead=true; pr.deadT=0;
      AudioFX.dead();
      toast("🦈 サメは エネルギーが きれて しんでしまった…");
      continue;
    }
    let tgt=null, bd=1e18;
    if(pr.cool<=0 && pr.energy<1.2){
      for(const f of fish){
        const d2=(f.x-pr.x)*(f.x-pr.x)+(f.y-pr.y)*(f.y-pr.y);
        if(d2<bd){ bd=d2; tgt=f; }
      }
    }
    let ax=0, ay=0;
    if(tgt && bd<176400){
      const d=Math.sqrt(bd)||1;
      const txx=tgt.x+tgt.vx*.25, tyy=tgt.y+tgt.vy*.25;
      const ux=(txx-pr.x)/d, uy=(tyy-pr.y)/d;
      const inBurst = d<230 && pr.energy>.15;
      pr.burst = inBurst ? Math.min(1,pr.burst+dt*3) : Math.max(0,pr.burst-dt*1.5);
      const spd=110+pr.burst*230;
      ax+=(ux*spd-pr.vx)*2.2; ay+=(uy*spd-pr.vy)*2.2;
      pr.mouth=lerp(pr.mouth, d<70?1:0, Math.min(1,dt*8));
      if(d < 10+pr.size*4){
        tgt.dead=true;
        pr.energy=Math.min(1.5, pr.energy+.3);
        pr.cool=rand(6,12);
        pr.meals++;
        pr.size=Math.min(1.45, 1+pr.meals*.03);
        burst(tgt.x,tgt.y,SPECIES[tgt.sp].hue,14,4);
        ringFx(tgt.x,tgt.y,46,SPECIES[tgt.sp].hue);
        sloTimer=.3;
        AudioFX.gulp();
      }
    }else{
      pr.burst=Math.max(0,pr.burst-dt*1.5);
      pr.mouth=lerp(pr.mouth,0,Math.min(1,dt*6));
      ax+=Math.cos(simT*.4+pr.phase)*60;
      ay+=Math.sin(simT*.31+pr.phase)*40;
    }
    flowSample(pr.x,pr.y,fv);
    ax+=fv.x*.5; ay+=fv.y*.5;
    const M=90;
    if(pr.x<M) ax+=(M-pr.x)*4;
    if(pr.x>W-M) ax-=(pr.x-(W-M))*4;
    if(pr.y<SURF+50) ay+=(SURF+50-pr.y)*5;
    if(pr.y>SAND-40) ay-=(pr.y-(SAND-40))*5;
    pr.vx+=ax*dt; pr.vy+=ay*dt;
    const vmax=120+pr.burst*240;
    const vL=Math.hypot(pr.vx,pr.vy)||1;
    if(vL>vmax){ pr.vx*=vmax/vL; pr.vy*=vmax/vL; }
    pr.x+=pr.vx*dt; pr.y+=pr.vy*dt;
    pr.x=clamp(pr.x,10,W-10); pr.y=clamp(pr.y,SURF+10,SAND-12);
  }
  preds=preds.filter(p=>!(p.dead&&p.deadT>5));

  /* --- pellets --- */
  for(const p of pellets){
    p.life-=dt;
    flowSample(p.x,p.y,fv);
    p.vx=lerp(p.vx, fv.x*.8, Math.min(1,dt*2));
    p.vy=lerp(p.vy, 26+fv.y*.8, Math.min(1,dt*2));
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.y>SAND-5){ p.y=SAND-5; p.vx*=.9; }
    p.x=clamp(p.x,4,W-4);
  }
  pellets=pellets.filter(p=>!p.eaten&&p.life>0);
  fish=fish.filter(f=>!f.dead);

  recolT+=dt;
  if(fish.length<8 && recolT>12){
    recolT=0;
    const sp=Math.floor(rand(0,SPECIES.length));
    const fromLeft=Math.random()<.5;
    const sx=fromLeft?-10:W+10, sy=rand(H*.3,H*.6);
    for(let i=0;i<26;i++){
      const nf=new Fish(sx+rand(-30,30), sy+rand(-40,40), sp, false);
      nf.vx=fromLeft?120:-120;
      fish.push(nf);
    }
    toast("🐟 あたらしい群れが やってきた！");
  }

  /* --- kelp --- */
  for(const k of kelp){
    k.ph+=dt;
    const a=k.pts;
    for(let i=1;i<a.length;i++){
      const p=a[i];
      const vx=(p.x-p.px)*.9, vy=(p.y-p.py)*.9;
      p.px=p.x; p.py=p.y;
      flowSample(p.x,p.y,fv);
      const fx=fv.x*3+Math.sin(k.ph*.9+i*.6)*30;
      p.x+=vx+fx*dt*dt;
      p.y+=vy+(-95)*dt*dt;
    }
    for(let it=0;it<2;it++){
      for(let i=1;i<a.length;i++){
        const q=a[i-1], p=a[i];
        const dx=p.x-q.x, dy=p.y-q.y;
        const d=Math.hypot(dx,dy)||1e-6;
        const diff=(d-k.segLen)/d;
        if(i===1){ p.x-=dx*diff; p.y-=dy*diff; }
        else{
          q.x+=dx*diff*.5; q.y+=dy*diff*.5;
          p.x-=dx*diff*.5; p.y-=dy*diff*.5;
        }
      }
    }
  }

  /* --- bubbles --- */
  if(Math.random()<dt*1.7) bubbleAt(rand(W), SAND-2);
  for(const b of bubbles){
    b.ph+=dt*4;
    b.y-=(28+b.r*7)*dt;
    b.x+=Math.sin(b.ph)*14*dt;
    if(b.y<SURF+8){ b.popd=true; ringFx(b.x,b.y,7,190); AudioFX.pop(); }
  }
  bubbles=bubbles.filter(b=>!b.popd);
}
function bubbleAt(x,y){
  if(bubbles.length<60) bubbles.push({x,y,r:rand(1.5,4),ph:rand(TAU),popd:false});
}

/* ================= interactions ================= */
let hintHidden=false;
function hideHint(){
  if(hintHidden) return; hintHidden=true;
  $("hint").classList.add("off");
  setTimeout(()=>{ $("hint").style.display="none"; },700);
}
function evPos(e){
  const r=cv.getBoundingClientRect();
  return [e.clientX-r.left, e.clientY-r.top];
}
function dropFood(x,y,n){
  for(let i=0;i<n;i++){
    if(pellets.length>=PELLET_CAP) return;
    pellets.push({x:x+rand(-9,9), y:y+rand(-6,6), vx:rand(-14,14), vy:rand(0,16), life:45, eaten:false});
  }
  AudioFX.sprinkle();
}
function dropPred(x,y){
  const alive=preds.filter(p=>!p.dead).length;
  if(alive>=PRED_CAP){ toast("🦈 サメは 5ひきまで！"); return; }
  preds.push(new Pred(x, clamp(y,SURF+30,SAND-30)));
  ringFx(x,y,70,208);
  for(let i=0;i<8;i++) bubbleAt(x+rand(-16,16), y+rand(-10,10));
  AudioFX.splash();
  toast("🦈 サメ とうじょう！");
}
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();
  AudioFX.init(); AudioFX.resume();
  hideHint();
  const [x,y]=evPos(e);
  ptr.down=true; ptr.x=ptr.lx=x; ptr.y=ptr.ly=y; ptr.foodAcc=0;
  try{ cv.setPointerCapture(e.pointerId); }catch(err){}
  if(tool==="food") dropFood(x,y,5);
  else if(tool==="pred") dropPred(x,y);
});
cv.addEventListener("pointermove",e=>{
  const [x,y]=evPos(e);
  const d=dist(ptr.x,ptr.y,x,y);
  ptr.spd=Math.max(ptr.spd, d*60);
  if(ptr.down){
    if(tool==="food"){
      ptr.foodAcc+=d;
      while(ptr.foodAcc>14){ ptr.foodAcc-=14; dropFood(x,y,2); }
    }else if(tool==="flow"){
      const steps=Math.max(1,Math.ceil(d/22));
      for(let i=0;i<steps;i++){
        const t=(i+1)/steps;
        flowAdd(lerp(ptr.x,x,t), lerp(ptr.y,y,t), (x-ptr.x)*13, (y-ptr.y)*13);
      }
    }
  }
  ptr.x=x; ptr.y=y;
});
function release(){ ptr.down=false; }
cv.addEventListener("pointerup",release);
cv.addEventListener("pointercancel",release);
addEventListener("blur",release);
cv.addEventListener("contextmenu",e=>e.preventDefault());

/* ================= UI ================= */
function toast(msg){
  const el=$("toast"); el.textContent=msg;
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove("show"),1700);
}
function setTool(t,msg){
  tool=t;
  ["t-food","t-pred","t-flow"].forEach(id=>$(id).classList.toggle("on", id==="t-"+t));
  if(msg) toast(msg);
  AudioFX.init();
}
$("t-food").onclick=()=>setTool("food","🤿 ドラッグでえさをまく");
$("t-pred").onclick=()=>setTool("pred","🦈 タップでサメをだす");
$("t-flow").onclick=()=>setTool("flow","🌊 ドラッグで水流をつくる");

$("b-night").onclick=function(){
  nightTarget = nightTarget>.5 ? 0 : 1;
  this.classList.toggle("on", nightTarget>.5);
  $("mode").textContent = nightTarget>.5 ? "🌙 よる" : "☀️ ひる";
  toast(nightTarget>.5 ? "🌙 よる — 生き物の光がきれいだ" : "☀️ ひる");
  AudioFX.init();
};
$("b-slow").onclick=function(){
  slowOn=!slowOn;
  this.classList.toggle("on",slowOn);
  toast(slowOn?"🐢 スローモーション":"⏱ 通常速度");
  AudioFX.init();
};
$("b-snd").onclick=function(){
  AudioFX.init(); AudioFX.on=!AudioFX.on;
  if(AudioFX.ambient) AudioFX.ambient.gain.value = AudioFX.on?.055:0;
  this.classList.toggle("on",AudioFX.on);
  this.querySelector("em").textContent=AudioFX.on?"🔊":"🔇";
  toast(AudioFX.on?"🔊 おと ON":"🔇 おと OFF");
};
$("b-reset").onclick=()=>{ buildScene(); popSamples=[]; toast("↺ リセット"); AudioFX.init(); };

addEventListener("keydown",e=>{
  if(e.key==="1") setTool("food","🤿 えさ");
  else if(e.key==="2") setTool("pred","🦈 サメ");
  else if(e.key==="3") setTool("flow","🌊 ながれ");
  else if(e.key==="n"||e.key==="N") $("b-night").click();
  else if(e.key==="s"||e.key==="S") $("b-slow").click();
  else if(e.key==="r"||e.key==="R") $("b-reset").click();
});
addEventListener("resize",()=>{
  resize(); genAmbient(); makeKelp();
  for(const f of fish){ f.x=clamp(f.x,6,W-6); f.y=clamp(f.y,SURF+8,SAND-8); }
  for(const p of preds){ p.x=clamp(p.x,10,W-10); p.y=clamp(p.y,SURF+10,SAND-12); }
});

/* ================= render ================= */
function mixc(a,b,t){
  return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`;
}
function render(rdt){
  const pdt=rdt*ts;
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.t+=pdt;
    if(p.t>p.life){ parts.splice(i,1); continue; }
    if(p.kind==="heart"){ p.y+=p.vy*pdt; p.x+=Math.sin(p.t*6)*12*pdt; }
    else{ p.vx*=.98; p.vy*=.98; p.x+=p.vx*pdt; p.y+=p.vy*pdt; }
  }
  for(let i=ringsFx.length-1;i>=0;i--){
    ringsFx[i].t+=pdt;
    if(ringsFx[i].t>ringsFx[i].life) ringsFx.splice(i,1);
  }

  ctx.setTransform(DPR,0,0,DPR,0,0);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,  mixc([16,62,96],[5,11,26], night));
  g.addColorStop(.6, mixc([8,30,56], [2,5,13],  night));
  g.addColorStop(1,  mixc([5,16,32], [1,3,8],   night));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(night<.95){
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    for(let i=0;i<4;i++){
      const bx=W*(0.15+i*.24);
      ctx.save();
      ctx.translate(bx,0);
      ctx.rotate(Math.sin(simT*.1+i*1.7)*.06+.1);
      const rg=ctx.createLinearGradient(0,0,0,H*.8);
      rg.addColorStop(0,`rgba(140,220,255,${.075*(1-night)})`);
      rg.addColorStop(1,"rgba(140,220,255,0)");
      ctx.fillStyle=rg;
      ctx.fillRect(-40-i*8,0,80+i*16,H*.8);
      ctx.restore();
    }
    ctx.restore();
  }
  if(night>.05){
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    for(const p of plank){
      p.ph+=pdt;
      p.x+=Math.sin(p.ph*.5)*4*pdt+(2+night*2)*p.z*pdt;
      if(p.x>W+5) p.x=-5;
      const a=night*(.12+.25*p.z)*(0.6+.4*Math.sin(p.ph*2));
      ctx.globalAlpha=a;
      const s=3+p.z*3;
      ctx.drawImage(glow(165), p.x-s/2, p.y-s/2, s, s);
    }
    ctx.restore();
  }
  if(night>.03){
    tctx.fillStyle="rgba(2,6,14,.075)";
    tctx.fillRect(0,0,W,H);
    for(const f of fish){
      const s=5*f.size*SPECIES[f.sp].size;
      tctx.drawImage(glow(SPECIES[f.sp].hue), f.x-s/2, f.y-s/2, s, s);
    }
    for(const pr of preds){
      if(pr.dead) continue;
      const s=16*pr.size;
      tctx.drawImage(glow(208), pr.x-s/2, pr.y-s/2, s, s);
    }
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    ctx.globalAlpha=night*.9;
    ctx.drawImage(trailCv,0,0,W,H);
    ctx.restore();
  }

  const sg=ctx.createLinearGradient(0,SAND,0,H);
  sg.addColorStop(0, mixc([72,58,38],[18,16,14],night));
  sg.addColorStop(1, mixc([44,36,24],[10,9,8],night));
  ctx.fillStyle=sg;
  ctx.fillRect(0,SAND,W,H-SAND);
  ctx.fillStyle=`rgba(0,0,0,${.18})`;
  for(const pb of pebbles){
    ctx.globalAlpha=pb.a;
    ctx.beginPath(); ctx.arc(pb.x,pb.y,pb.r,0,TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  for(const k of kelp){
    const a=k.pts;
    ctx.strokeStyle=`hsla(${k.hue},45%,${lerp(30,20,night)}%,.9)`;
    for(let i=1;i<a.length;i++){
      ctx.lineWidth=lerp(7,1.6,i/a.length);
      ctx.beginPath();
      ctx.moveTo(a[i-1].x,a[i-1].y);
      ctx.lineTo(a[i].x,a[i].y);
      ctx.stroke();
    }
    if(night>.1){
      const tip=a[a.length-1];
      ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.globalAlpha=night*.8;
      ctx.drawImage(glow(165), tip.x-6, tip.y-6, 12, 12);
      ctx.restore();
    }
  }

  ctx.fillStyle="hsla(45,80%,65%,.95)";
  for(const p of pellets){
    ctx.beginPath(); ctx.arc(p.x,p.y,2.1,0,TAU); ctx.fill();
  }

  ctx.strokeStyle="rgba(190,230,255,.4)";
  ctx.lineWidth=1;
  for(const b of bubbles){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.stroke();
  }

  for(const f of fish){
    const sp=SPECIES[f.sp];
    const sz=f.size*sp.size;
    const ang=Math.atan2(f.vy,f.vx);
    const tail=Math.sin(f.phase)*(2+Math.hypot(f.vx,f.vy)*.006);
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.rotate(ang);
    const lt=60+f.panic*18;
    ctx.fillStyle=`hsla(${sp.hue+f.hueJ},75%,${lt}%,.95)`;
    ctx.beginPath();
    ctx.moveTo(-6.2*sz, tail*sz*.4);
    ctx.lineTo(-10.5*sz,(tail-2.4)*sz);
    ctx.lineTo(-10.5*sz,(tail+2.4)*sz);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0,0,7*sz,2.8*sz,0,0,TAU);
    ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.55)";
    ctx.beginPath();
    ctx.ellipse(1.5*sz,-.6*sz,3.4*sz,1.1*sz,0,0,TAU);
    ctx.fill();
    ctx.fillStyle="#06121f";
    ctx.beginPath(); ctx.arc(4.2*sz,-.7*sz,.85*sz,0,TAU); ctx.fill();
    ctx.restore();
  }

  for(const pr of preds){
    const sz=pr.size;
    let ang=Math.atan2(pr.vy,pr.vx);
    ctx.save();
    ctx.translate(pr.x,pr.y);
    if(pr.dead){
      ctx.globalAlpha=clamp(1-pr.deadT/5,0,1);
      ctx.rotate(ang+Math.PI*clamp(pr.deadT,0,1));
    }else ctx.rotate(ang);
    const flip = (pr.vx<0 && !pr.dead) ? -1 : 1;
    ctx.scale(1, flip<0?-1:1);
    const tt=Math.sin(pr.phase)*(4+pr.burst*5);
    ctx.fillStyle="hsl(208,32%,46%)";
    ctx.beginPath();
    ctx.moveTo(-22*sz,0);
    ctx.lineTo(-36*sz, tt-12*sz);
    ctx.lineTo(-30*sz, tt);
    ctx.lineTo(-36*sz, tt+9*sz);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2*sz,-7*sz);
    ctx.lineTo(-9*sz,-7*sz);
    ctx.lineTo(-3*sz,-19*sz);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="hsl(208,35%,54%)";
    ctx.beginPath();
    ctx.ellipse(0,0,26*sz,9*sz,0,0,TAU);
    ctx.fill();
    ctx.fillStyle="rgba(225,240,255,.3)";
    ctx.beginPath();
    ctx.ellipse(3*sz,3.4*sz,19*sz,4.6*sz,0,0,TAU);
    ctx.fill();
    if(pr.mouth>.04 && !pr.dead){
      ctx.fillStyle="#0a1622";
      ctx.beginPath();
      ctx.moveTo(25*sz,.5*sz);
      ctx.lineTo(12*sz,(.5-6.5*pr.mouth)*sz);
      ctx.lineTo(12*sz,(.5+6.5*pr.mouth)*sz);
      ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle="rgba(10,22,34,.4)";
    ctx.lineWidth=1.2*sz;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(8*sz-i*3*sz,0,5*sz,-.6,.6);
      ctx.stroke();
    }
    ctx.fillStyle="#eaf4ff";
    ctx.beginPath(); ctx.arc(15*sz,-3.4*sz,2.4*sz,0,TAU); ctx.fill();
    ctx.fillStyle="#06121f";
    ctx.beginPath(); ctx.arc(15.7*sz,-3.4*sz,1.2*sz,0,TAU); ctx.fill();
    ctx.restore();
    if(!pr.dead && pr.energy<.35){
      const bl=.5+.5*Math.sin(simT*8);
      ctx.fillStyle=`rgba(255,90,90,${.25+.45*bl})`;
      ctx.fillRect(pr.x-16, pr.y-30*sz, 32*clamp(pr.energy/.35,0,1), 3);
      ctx.strokeStyle="rgba(255,90,90,.5)";
      ctx.strokeRect(pr.x-16, pr.y-30*sz, 32, 3);
    }
  }

  ctx.save();
  ctx.globalCompositeOperation="lighter";
  ctx.lineWidth=1;
  for(const t of tracers){
    flowSample(t.x,t.y,fv);
    const spd=Math.hypot(fv.x,fv.y);
    t.x+=fv.x*pdt; t.y+=fv.y*pdt;
    if(t.x<0||t.x>W||t.y<SURF||t.y>SAND||(spd<12&&Math.random()<.01)){
      t.x=rand(W); t.y=rand(SURF+20,SAND-10);
      continue;
    }
    if(spd>16){
      ctx.strokeStyle=`rgba(140,230,255,${clamp(spd/420,.05,.4)})`;
      ctx.beginPath();
      ctx.moveTo(t.x,t.y);
      ctx.lineTo(t.x-fv.x*.07, t.y-fv.y*.07);
      ctx.stroke();
    }
  }
  for(const p of parts){
    const a=1-p.t/p.life;
    if(p.kind==="heart"){
      ctx.globalAlpha=a;
      ctx.font="11px sans-serif";
      ctx.textAlign="center";
      ctx.fillStyle="rgba(255,120,170,.95)";
      ctx.fillText("♥", p.x, p.y);
      ctx.globalAlpha=1;
    }else{
      const s=p.r*4;
      ctx.globalAlpha=a;
      ctx.drawImage(glow(p.hue), p.x-s/2, p.y-s/2, s, s);
      ctx.globalAlpha=1;
    }
  }
  for(const r of ringsFx){
    const t=r.t/r.life;
    ctx.strokeStyle=`hsla(${r.hue},90%,70%,${.55*(1-t)})`;
    ctx.lineWidth=2*(1-t)+.5;
    ctx.beginPath();
    ctx.arc(r.x,r.y,lerp(3,r.max,1-Math.pow(1-t,3)),0,TAU);
    ctx.stroke();
  }
  ctx.restore();

  ctx.strokeStyle=`rgba(190,235,255,${lerp(.4,.18,night)})`;
  ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let x=0;x<=W;x+=10){
    const y=SURF+Math.sin(x*.02+simT*1.3)*2.4+Math.sin(x*.043-simT*.8)*1.2;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.fillStyle=`rgba(190,235,255,${lerp(.07,.02,night)})`;
  ctx.fillRect(0,0,W,SURF);

  drawGraph();

  if(ts<.85){
    const h=(1-ts)*30;
    ctx.fillStyle="rgba(0,0,0,.55)";
    ctx.fillRect(0,0,W,h);
    ctx.fillRect(0,H-h,W,h);
    if(ts<.6){
      ctx.fillStyle="rgba(84,224,200,.85)";
      ctx.font="10px monospace";
      ctx.textAlign="right";
      ctx.fillText("⬇ SLOW", W-18, h+16);
    }
  }
}

function drawGraph(){
  if(popSamples.length<2) return;
  const gx=16, gy=64, gw=190, gh=56;
  ctx.fillStyle="rgba(10,20,32,.55)";
  ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle="rgba(110,200,255,.18)";
  ctx.lineWidth=1;
  ctx.strokeRect(gx,gy,gw,gh);
  const n=popSamples.length;
  ctx.strokeStyle="rgba(84,224,200,.9)";
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const x=gx+i/(150-1)*gw;
    const y=gy+gh-(popSamples[i].f/FISH_CAP)*gh;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.strokeStyle="rgba(255,110,110,.9)";
  ctx.beginPath();
  for(let i=0;i<n;i++){
    const x=gx+i/(150-1)*gw;
    const y=gy+gh-clamp(popSamples[i].p/6,0,1)*gh;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.font="9px sans-serif";
  ctx.textAlign="left";
  ctx.fillStyle="rgba(126,152,184,.9)";
  ctx.fillText("ぐんれい", gx+5, gy+11);
}

/* ================= main loop ================= */
let last=performance.now(), acc=0, fpsE=60, statT=0;
const DT=1/60;
function frame(now){
  requestAnimationFrame(frame);
  let rdt=(now-last)/1000; last=now;
  if(rdt>.05) rdt=.05;
  fpsE=lerp(fpsE,1/Math.max(rdt,1e-4),.04);
  if(sloTimer>0) sloTimer-=rdt;
  const target=slowOn?.22:(sloTimer>0?.3:1);
  ts=lerp(ts,target,.14);
  acc+=rdt*ts;
  let n=0;
  while(acc>=DT&&n<3){ step(DT); acc-=DT; n++; }
  if(acc>DT) acc=0;
  render(rdt);
  sampleT+=rdt;
  if(sampleT>.5){
    sampleT=0;
    popSamples.push({f:fish.length, p:preds.filter(p=>!p.dead).length});
    if(popSamples.length>150) popSamples.shift();
  }
  statT+=rdt;
  if(statT>.25){
    statT=0;
    $("fpsv").textContent=Math.round(fpsE);
    $("stats").textContent=`🐟 ${fish.length} • 🦈 ${preds.filter(p=>!p.dead).length} • 🤿 ${pellets.length}`;
  }
}
resize();
genAmbient();
buildScene();
requestAnimationFrame(frame);
</script>
